services:

  api:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/testdb?sslmode=disable
    depends_on:
      - postgres


  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api


  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
