name: Build and Push Image


on:
  push:
    branches:
      - main


permissions:
  id-token: write
  contents: read


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::665146707658:role/github-actions-ecr-role
        aws-region: us-east-1


    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2


    - name: Build image
      run: |
        docker build \
        -t mini-server .


    - name: Tag image
      run: |
        docker tag mini-server:latest \
        665146707658.dkr.ecr.eu-north-1.amazonaws.com/mini-server:latest


    - name: Push image
      run: |
        docker push \
        665146707658.dkr.ecr.eu-north-1.amazonaws.com/mini-server:latest
